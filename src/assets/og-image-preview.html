<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG Image Preview — marilau.tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      font-family: 'Inter', sans-serif;
    }

    .info {
      color: #666;
      font-size: 13px;
    }

    /* ──────────────────────────────────────
       OG CARD — 1200 × 630
    ────────────────────────────────────── */
    .og-card {
      width: 1200px;
      height: 630px;
      background: #1F244A;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 72px 88px;
      gap: 72px;
    }

    /* Background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: #66e6dd;
      top: -180px; right: -80px;
    }
    .blob-2 {
      width: 380px; height: 380px;
      background: #9a618d;
      bottom: -120px; left: 280px;
    }
    .blob-3 {
      width: 260px; height: 260px;
      background: #F0B810;
      bottom: -60px; right: 320px;
      opacity: 0.10;
    }

    /* Grid lines subtle */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(102,230,221,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102,230,221,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Top accent bar */
    .accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #66e6dd, #9a618d, #F0B810);
    }

    /* Profile photo */
    .photo-wrap {
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .photo-wrap img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 3px solid rgba(102, 230, 221, 0.4);
      display: block;
    }
    .photo-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(102, 230, 221, 0.2);
    }

    /* Text content */
    .content {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .tag {
      display: inline-block;
      background: rgba(102, 230, 221, 0.12);
      border: 1px solid rgba(102, 230, 221, 0.3);
      color: #66e6dd;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .name .mari,
    .name .lau {
      background: linear-gradient(90deg, #9a618d, #66e6dd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .domain {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #66e6dd, #9a618d);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      max-width: 520px;
    }

    .pills {
      display: flex;
      gap: 10px;
      margin-top: 36px;
      flex-wrap: wrap;
    }
    .pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <p class="info">Captura esta tarjeta a 1200×630px → guárdala como <code>public/og-image.png</code></p>

  <div class="og-card">
    <!-- Background elements -->
    <div class="grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="accent-bar"></div>

    <!-- Profile photo -->
    <div class="photo-wrap">
      <img src="./public/profile.png" alt="Mariela" onerror="this.style.background='#184F67';this.style.borderRadius='50%'" />
      <div class="photo-ring"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="tag">Ingeniería · Mentoría · Comunidad</div>
      <div class="name"><span class="mari">marilau</span></div>
      <div class="domain">marilau.tech</div>
      <div class="divider"></div>
      <div class="tagline">Mentoría, comunidad y tecnología con propósito</div>
      <div class="pills">
        <span class="pill">Software Engineering</span>
        <span class="pill">Tech Mentorship</span>
        <span class="pill">Community Building</span>
      </div>
    </div>
  </div>

  <p class="info">Zoom del navegador al 100% antes de capturar</p>
</body>
</html>
